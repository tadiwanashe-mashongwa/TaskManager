spring.application.name=TaskManager

# 💡 Embedded Local H2 Database Settings
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# 💡 Force H2 Console Visibility so you can see your tables at http://localhost:8080/h2-console
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 💡 Application Diagnostics Metadata
app.metadata.name=TaskManager Engine
app.metadata.version=1.0.0-SNAPSHOT
app.metadata.environment=Local-Development